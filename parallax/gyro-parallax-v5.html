<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gyro Parallax v5</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
body, html {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
#scene {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}
#bg-canvas {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0; left: 0;
  display: block;
}

/* Permission Overlay */
#permission-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
#permission-overlay.hidden { display: none; }
#permission-btn {
  padding: 16px 32px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: #fff;
  color: #000;
  font-weight: 600;
  cursor: pointer;
}

/* Controls Panel */
#controls {
  position: fixed;
  bottom: 16px;
  right: 16px;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 12px;
  z-index: 100;
  color: #fff;
  font-size: 12px;
  min-width: 250px;
  overflow: hidden;
}
#controls-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-size: 11px;
}
#controls-header .chevron {
  transition: transform 0.2s ease;
}
#controls.collapsed #controls-body { display: none; }
#controls.collapsed #controls-header .chevron { transform: rotate(-90deg); }
#controls-body {
  padding: 4px 14px 14px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
#controls label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
  gap: 8px;
}
#controls input[type="range"] { width: 100px; flex-shrink: 0; }
#controls .toggle-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
#controls .val { min-width: 38px; text-align: right; font-variant-numeric: tabular-nums; opacity: 0.7; }
#controls .section-title { margin-top: 12px; font-weight: 600; opacity: 0.5; text-transform: uppercase; font-size: 10px; letter-spacing: 0.05em; }
</style>
</head>
<body>

<div id="scene">
  <canvas id="bg-canvas"></canvas>
</div>

<div id="permission-overlay" class="hidden">
  <button id="permission-btn">Enable Motion</button>
</div>

<div id="controls">
  <div id="controls-header">
    <span>Controls</span>
    <span class="chevron">▾</span>
  </div>
  <div id="controls-body">
    <div class="section-title">Camera</div>
    <label>Orbit X <input type="range" id="ctrl-orbitX" min="0" max="35" step="1" value="18"><span class="val" id="val-orbitX">18</span></label>
    <label>Orbit Y <input type="range" id="ctrl-orbitY" min="0" max="35" step="1" value="12"><span class="val" id="val-orbitY">12</span></label>
    <label>FOV <input type="range" id="ctrl-fov" min="20" max="90" step="1" value="45"><span class="val" id="val-fov">45</span></label>
    <label>Camera Dist <input type="range" id="ctrl-camDist" min="1" max="5" step="0.1" value="2.5"><span class="val" id="val-camDist">2.5</span></label>

    <div class="section-title">Depth Mesh</div>
    <label>Height Scale <input type="range" id="ctrl-height" min="0" max="0.8" step="0.01" value="0.3"><span class="val" id="val-height">0.3</span></label>
    <label>Focus Depth <input type="range" id="ctrl-focus" min="0" max="1" step="0.01" value="0.5"><span class="val" id="val-focus">0.5</span></label>

    <div class="section-title">Foreground</div>
    <label>FG Height <input type="range" id="ctrl-fgHeight" min="0" max="0.6" step="0.01" value="0.15"><span class="val" id="val-fgHeight">0.15</span></label>
    <label>FG Lift <input type="range" id="ctrl-fgLift" min="0" max="0.5" step="0.01" value="0.08"><span class="val" id="val-fgLift">0.08</span></label>

    <div class="section-title">Feel</div>
    <label>Smoothing <input type="range" id="ctrl-smooth" min="0.02" max="0.2" step="0.01" value="0.07"><span class="val" id="val-smooth">0.07</span></label>

    <div class="toggle-row">
      <input type="checkbox" id="ctrl-wireframe">
      <label for="ctrl-wireframe" style="margin:0">Wireframe</label>
    </div>
    <div class="toggle-row">
      <input type="checkbox" id="ctrl-depth-view">
      <label for="ctrl-depth-view" style="margin:0">Show Depth</label>
    </div>
  </div>
</div>

<script>
// ─── Config ───
const config = {
  orbitX: 18,         // max horizontal orbit angle (degrees)
  orbitY: 12,         // max vertical orbit angle (degrees)
  fov: 45,            // field of view (degrees)
  camDist: 2.5,       // camera distance from origin
  heightScale: 0.3,   // depth map → vertex Z displacement
  focusDepth: 0.5,    // depth pivot (this depth = Z=0 plane)
  fgHeight: 0.15,     // foreground additional displacement scale
  fgLift: 0.08,       // foreground base lift above background
  smoothing: 0.07,
  wireframe: false,
  showDepth: false
};

const GRID = 350;     // mesh resolution (350×350 for detailed wireframe)

// ─── DOM ───
const canvas = document.getElementById('bg-canvas');
const overlay = document.getElementById('permission-overlay');
const permissionBtn = document.getElementById('permission-btn');

// ─── WebGL Context ───
const gl = canvas.getContext('webgl', {
  alpha: false,
  premultipliedAlpha: false,
  antialias: true
});
const extUint = gl.getExtension('OES_element_index_uint');

// ─── Shaders ───
const vertSrc = `
precision mediump float;
precision mediump int;
attribute vec2 aGridPos;  // 0..1 grid coordinate

uniform sampler2D uDepthMap;
uniform float uHeightScale;
uniform float uFocusDepth;
uniform float uFgLift;
uniform float uFgHeight;
uniform int uLayer;       // 0 = background, 1 = foreground
uniform mat4 uMVP;
uniform vec2 uCoverScale;
uniform vec2 uCoverOffset;
uniform float uImageAspect;

varying vec2 vUv;
varying float vDepth;

void main() {
  // Cover-fit UV
  vec2 uv = aGridPos * uCoverScale + uCoverOffset;
  vUv = uv;

  // Sample depth at this vertex
  float depth = texture2D(uDepthMap, uv).r;
  vDepth = depth;

  // Convert grid to world XY: centered at origin, scaled by image aspect
  vec2 worldXY = (aGridPos - 0.5) * 2.0;
  worldXY.x *= uImageAspect;

  // Z displacement: pivot at focusDepth, invert so far=more displacement
  float relZ = (uFocusDepth - depth) * uHeightScale;

  // Foreground layer gets extra lift + its own depth response
  if (uLayer == 1) {
    float fgDepthPush = (depth - uFocusDepth) * uFgHeight;
    relZ = uFgLift + fgDepthPush;
  }

  vec4 pos = uMVP * vec4(worldXY, relZ, 1.0);
  gl_Position = pos;
}
`;

const fragSrc = `
precision mediump float;
precision mediump int;

uniform sampler2D uColorTexture;
uniform sampler2D uForeground;
uniform sampler2D uDepthMap;
uniform int uLayer;
uniform int uShowDepth;
uniform int uWireframe;

varying vec2 vUv;
varying float vDepth;

void main() {
  if (uWireframe == 1) {
    // Depth-based wireframe coloring: bright on raised surfaces, dark in recesses
    float brightness = vDepth * 0.85 + 0.15;
    gl_FragColor = vec4(brightness * 0.4, brightness * 0.95, brightness * 0.6, 1.0);
    return;
  }

  if (uShowDepth == 1) {
    gl_FragColor = vec4(vec3(vDepth), 1.0);
    return;
  }

  if (uLayer == 0) {
    gl_FragColor = vec4(texture2D(uColorTexture, vUv).rgb, 1.0);
  } else {
    vec4 fg = texture2D(uForeground, vUv);
    if (fg.a < 0.01) discard;
    gl_FragColor = vec4(fg.rgb, 1.0);
  }
}
`;

// ─── Compile ───
function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vs = createShader(gl.VERTEX_SHADER, vertSrc);
const fs = createShader(gl.FRAGMENT_SHADER, fragSrc);
const program = gl.createProgram();
gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);
if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(program));
}
gl.useProgram(program);

// ─── Attributes & Uniforms ───
const aGridPos = gl.getAttribLocation(program, 'aGridPos');

const u = {
  depthMap: gl.getUniformLocation(program, 'uDepthMap'),
  colorTex: gl.getUniformLocation(program, 'uColorTexture'),
  fgTex: gl.getUniformLocation(program, 'uForeground'),
  heightScale: gl.getUniformLocation(program, 'uHeightScale'),
  focusDepth: gl.getUniformLocation(program, 'uFocusDepth'),
  fgLift: gl.getUniformLocation(program, 'uFgLift'),
  fgHeight: gl.getUniformLocation(program, 'uFgHeight'),
  layer: gl.getUniformLocation(program, 'uLayer'),
  mvp: gl.getUniformLocation(program, 'uMVP'),
  coverScale: gl.getUniformLocation(program, 'uCoverScale'),
  coverOffset: gl.getUniformLocation(program, 'uCoverOffset'),
  imageAspect: gl.getUniformLocation(program, 'uImageAspect'),
  showDepth: gl.getUniformLocation(program, 'uShowDepth'),
  wireframe: gl.getUniformLocation(program, 'uWireframe'),
};

// Texture units
gl.uniform1i(u.colorTex, 0);
gl.uniform1i(u.depthMap, 1);
gl.uniform1i(u.fgTex, 2);

// ─── Generate Grid Mesh ───
function generateGrid(res) {
  const verts = new Float32Array((res + 1) * (res + 1) * 2);
  let vi = 0;
  for (let y = 0; y <= res; y++) {
    for (let x = 0; x <= res; x++) {
      verts[vi++] = x / res;
      verts[vi++] = y / res;
    }
  }

  const numTris = res * res * 6;
  const indices = extUint ? new Uint32Array(numTris) : new Uint16Array(numTris);
  let ii = 0;
  for (let y = 0; y < res; y++) {
    for (let x = 0; x < res; x++) {
      const tl = y * (res + 1) + x;
      const tr = tl + 1;
      const bl = tl + (res + 1);
      const br = bl + 1;
      indices[ii++] = tl; indices[ii++] = bl; indices[ii++] = tr;
      indices[ii++] = tr; indices[ii++] = bl; indices[ii++] = br;
    }
  }

  return { verts, indices, numIndices: numTris };
}

const mesh = generateGrid(GRID);

const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, mesh.verts, gl.STATIC_DRAW);

const ibo = gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, mesh.indices, gl.STATIC_DRAW);

gl.enableVertexAttribArray(aGridPos);
gl.vertexAttribPointer(aGridPos, 2, gl.FLOAT, false, 0, 0);

// ─── Texture Loading ───
let imgNaturalW = 0, imgNaturalH = 0;
let texturesLoaded = 0;
let needsRedraw = true;

gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);

function loadTexture(url, unit, callback) {
  const tex = gl.createTexture();
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    gl.activeTexture(gl.TEXTURE0 + unit);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
    if (callback) callback(img);
    texturesLoaded++;
    if (texturesLoaded === 3) onTexturesReady();
  };
  img.src = url;
}

function onTexturesReady() {
  handleResize();
  loop();
  initSensors();
}

loadTexture('background.png', 0, (img) => {
  imgNaturalW = img.naturalWidth;
  imgNaturalH = img.naturalHeight;
});
loadTexture('depth.png', 1, null);
loadTexture('foreground.png', 2, null);

// ─── Cover UV ───
let coverScale = [1, 1];
let coverOffset = [0, 0];

function computeCoverUV(imgW, imgH, canvasW, canvasH) {
  const ia = imgW / imgH;
  const ca = canvasW / canvasH;
  let sx, sy, ox, oy;
  if (ca > ia) {
    sx = 1.0; sy = ia / ca;
    ox = 0.0; oy = (1.0 - sy) / 2.0;
  } else {
    sx = ca / ia; sy = 1.0;
    ox = (1.0 - sx) / 2.0; oy = 0.0;
  }
  return { sx, sy, ox, oy };
}

// ─── Matrix Math (minimal, no dependencies) ───
function mat4Perspective(fovDeg, aspect, near, far) {
  const f = 1.0 / Math.tan(fovDeg * Math.PI / 360);
  const nf = 1 / (near - far);
  return new Float32Array([
    f / aspect, 0, 0, 0,
    0, f, 0, 0,
    0, 0, (far + near) * nf, -1,
    0, 0, 2 * far * near * nf, 0
  ]);
}

function mat4LookAt(eye, target, up) {
  const zx = eye[0] - target[0], zy = eye[1] - target[1], zz = eye[2] - target[2];
  let len = Math.hypot(zx, zy, zz);
  const z = [zx/len, zy/len, zz/len];

  const xx = up[1]*z[2] - up[2]*z[1];
  const xy = up[2]*z[0] - up[0]*z[2];
  const xz = up[0]*z[1] - up[1]*z[0];
  len = Math.hypot(xx, xy, xz);
  const x = [xx/len, xy/len, xz/len];

  const y = [z[1]*x[2] - z[2]*x[1], z[2]*x[0] - z[0]*x[2], z[0]*x[1] - z[1]*x[0]];

  return new Float32Array([
    x[0], y[0], z[0], 0,
    x[1], y[1], z[1], 0,
    x[2], y[2], z[2], 0,
    -(x[0]*eye[0]+x[1]*eye[1]+x[2]*eye[2]),
    -(y[0]*eye[0]+y[1]*eye[1]+y[2]*eye[2]),
    -(z[0]*eye[0]+z[1]*eye[1]+z[2]*eye[2]),
    1
  ]);
}

function mat4Multiply(a, b) {
  const out = new Float32Array(16);
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 4; j++) {
      out[j * 4 + i] =
        a[i] * b[j*4] + a[4+i] * b[j*4+1] + a[8+i] * b[j*4+2] + a[12+i] * b[j*4+3];
    }
  }
  return out;
}

// ─── Resize ───
let aspect = 1;
function handleResize() {
  canvas.width  = canvas.offsetWidth  * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  gl.viewport(0, 0, canvas.width, canvas.height);
  aspect = canvas.width / canvas.height;
  if (imgNaturalW > 0) {
    const c = computeCoverUV(imgNaturalW, imgNaturalH, canvas.width, canvas.height);
    coverScale = [c.sx, c.sy];
    coverOffset = [c.ox, c.oy];
  }
  needsRedraw = true;
}
window.addEventListener('resize', handleResize);

// ─── Sensors ───
const current = { x: 0, y: 0 };
const target  = { x: 0, y: 0 };
let neutralBeta = null;
let gyroActive = false;

function initSensors() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    overlay.classList.remove('hidden');
    permissionBtn.onclick = () => {
      DeviceOrientationEvent.requestPermission().then(state => {
        if (state === 'granted') {
          overlay.classList.add('hidden');
          startGyro();
        }
      });
    };
  } else {
    overlay.classList.add('hidden');
    startGyro();
  }
  setTimeout(() => {
    if (!gyroActive) {
      window.addEventListener('mousemove', e => {
        target.x = (e.clientX / window.innerWidth  - 0.5) * 2;
        target.y = (e.clientY / window.innerHeight - 0.5) * 2;
      });
    }
  }, 2000);
}

function startGyro() {
  window.addEventListener('deviceorientation', (e) => {
    if (!e.gamma && !e.beta) return;
    if (neutralBeta === null) neutralBeta = e.beta;
    gyroActive = true;
    target.x = Math.max(-1, Math.min(1, e.gamma / 40));
    target.y = Math.max(-1, Math.min(1, (e.beta - neutralBeta) / 40));
  });
}

// ─── Render ───
const indexType = extUint ? gl.UNSIGNED_INT : gl.UNSIGNED_SHORT;

function render() {
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);
  gl.depthFunc(gl.LEQUAL);

  // Camera orbit: orbit around (0,0,0) based on gyro
  const orbitH = current.x * config.orbitX * Math.PI / 180;
  const orbitV = current.y * config.orbitY * Math.PI / 180;

  const camX = Math.sin(orbitH) * config.camDist;
  const camY = -Math.sin(orbitV) * config.camDist;
  const camZ = Math.cos(orbitH) * Math.cos(orbitV) * config.camDist;

  const view = mat4LookAt([camX, camY, camZ], [0, 0, 0], [0, 1, 0]);
  const proj = mat4Perspective(config.fov, aspect, 0.01, 100);
  const mvp = mat4Multiply(proj, view);

  gl.uniformMatrix4fv(u.mvp, false, mvp);
  gl.uniform2f(u.coverScale, coverScale[0], coverScale[1]);
  gl.uniform2f(u.coverOffset, coverOffset[0], coverOffset[1]);
  gl.uniform1f(u.imageAspect, imgNaturalW / imgNaturalH);
  gl.uniform1f(u.heightScale, config.heightScale);
  gl.uniform1f(u.focusDepth, config.focusDepth);
  gl.uniform1f(u.fgLift, config.fgLift);
  gl.uniform1f(u.fgHeight, config.fgHeight);
  gl.uniform1i(u.showDepth, config.showDepth ? 1 : 0);
  gl.uniform1i(u.wireframe, config.wireframe ? 1 : 0);

  const drawMode = config.wireframe ? gl.LINES : gl.TRIANGLES;

  // Draw background mesh (layer 0)
  gl.uniform1i(u.layer, 0);
  gl.drawElements(drawMode, mesh.numIndices, indexType, 0);

  // Draw foreground mesh (layer 1) — on top, with alpha discard
  gl.uniform1i(u.layer, 1);
  gl.drawElements(drawMode, mesh.numIndices, indexType, 0);
}

// ─── rAF Loop ───
function loop() {
  requestAnimationFrame(loop);

  current.x += (target.x - current.x) * config.smoothing;
  current.y += (target.y - current.y) * config.smoothing;

  if (Math.abs(target.x - current.x) < 0.0003 &&
      Math.abs(target.y - current.y) < 0.0003 &&
      !needsRedraw) return;
  needsRedraw = false;

  render();
}

// ─── Controls ───
function bindSlider(id, valId, prop) {
  const slider = document.getElementById(id);
  const valSpan = document.getElementById(valId);
  slider.addEventListener('input', () => {
    const v = parseFloat(slider.value);
    config[prop] = v;
    valSpan.textContent = v;
    needsRedraw = true;
  });
}

bindSlider('ctrl-orbitX',   'val-orbitX',   'orbitX');
bindSlider('ctrl-orbitY',   'val-orbitY',   'orbitY');
bindSlider('ctrl-fov',      'val-fov',      'fov');
bindSlider('ctrl-camDist',  'val-camDist',  'camDist');
bindSlider('ctrl-height',   'val-height',   'heightScale');
bindSlider('ctrl-focus',    'val-focus',    'focusDepth');
bindSlider('ctrl-fgHeight', 'val-fgHeight', 'fgHeight');
bindSlider('ctrl-fgLift',   'val-fgLift',   'fgLift');
bindSlider('ctrl-smooth',   'val-smooth',   'smoothing');

document.getElementById('ctrl-wireframe').addEventListener('change', (e) => {
  config.wireframe = e.target.checked;
  needsRedraw = true;
});
document.getElementById('ctrl-depth-view').addEventListener('change', (e) => {
  config.showDepth = e.target.checked;
  needsRedraw = true;
});

// ─── Collapsible Panel ───
document.getElementById('controls-header').addEventListener('click', () => {
  document.getElementById('controls').classList.toggle('collapsed');
});
</script>
</body>
</html>
